name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: macos-latest
    env:
      GRADLE_OPTS: -Xmx6g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Compile (all targets, no linking)
        run: |
          ./gradlew \
            compileKotlinIosArm64 \
            compileKotlinIosSimulatorArm64 \
            assembleDebug \
            desktopMainClasses \
            --parallel

      - name: Run tests
        run: ./gradlew desktopTest --parallel

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_number }}
          path: |
            composeApp/build/reports/tests/
            composeApp/build/test-results/
          retention-days: 7
